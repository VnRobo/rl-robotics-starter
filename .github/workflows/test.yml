name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install mujoco>=3.0 gymnasium>=0.29 stable-baselines3[extra]>=2.3 numpy pytest

      - name: Smoke test — env instantiation
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from envs import Go2Env, G1Env, H1Env
          for EnvCls in [Go2Env, G1Env, H1Env]:
              env = EnvCls()
              obs, _ = env.reset(seed=0)
              assert obs.shape[0] > 0
              obs, r, term, trunc, _ = env.step(env.action_space.sample())
              env.close()
          print('All envs OK')
          "

      - name: Import scripts
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from scripts.vnrobo_callback import VnRoboCallback
          print('Imports OK')
          "
